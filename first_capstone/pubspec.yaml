name: first_capstone
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  any_image_view: ^2.1.0
  bloc: ^9.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  freezed_annotation: ^3.1.0
  gap: ^3.0.1
  get_it: ^9.2.1
  go_router: ^17.1.0
  json_annotation: ^4.11.0
  just_audio: ^0.10.5
  shared_preferences: ^2.5.5
  sizer: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.1
  build_runner: ^2.13.1
  freezed: ^3.2.5

flutter:
  uses-material-design: true
  assets:
   - assets/images/
   - assets/podcasts/swalif/
   - assets/data/
  fonts:
    - family: Handicrafts
      fonts:
        - asset: assets/font/OTF/TheYearofHandicrafts-Regular.otf
        - asset: assets/font/OTF/TheYearofHandicrafts-Medium.otf
          weight: 500
        - asset: assets/font/OTF/TheYearofHandicrafts-SemiBold.otf
          weight: 600
        - asset: assets/font/OTF/TheYearofHandicrafts-Bold.otf
          weight: 700
        - asset: assets/font/OTF/TheYearofHandicrafts-Black.otf
          weight: 900